<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Stats Demo</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            padding: 40px;
        }

        .container {
            max-width: 700px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        button {
            padding: 8px 14px;
            border: none;
            background: #3498db;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #2980b9;
        }

        .tabs {
            display: flex;
            margin-top: 20px;
            border-bottom: 2px solid #eee;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .tab.active {
            border-bottom: 3px solid #3498db;
            color: #3498db;
        }

        .summary {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .box {
            text-align: center;
            flex: 1;
        }

        .income {
            color: #2ecc71;
            font-weight: bold;
        }

        .expense {
            color: #e74c3c;
            font-weight: bold;
        }

        .balance {
            color: #3498db;
            font-weight: bold;
        }

        .transaction {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>📊 Báo cáo chi tiêu</h1>

        <div class="header">
            <button onclick="prevMonth()">← Tháng trước</button>
            <h2 id="monthTitle"></h2>
            <button onclick="nextMonth()">Tháng sau →</button>
        </div>

        <div class="card">

            <div class="summary">

                <div class="box">
                    <div>Thu</div>
                    <div id="incomeTotal" class="income"></div>
                </div>

                <div class="box">
                    <div>Chi</div>
                    <div id="expenseTotal" class="expense"></div>
                </div>

                <div class="box">
                    <div>Thu chi</div>
                    <div id="balanceTotal" class="balance"></div>
                </div>

            </div>

            <div class="tabs">
                <div id="tabIncome" class="tab active" onclick="showIncome()">Thu</div>
                <div id="tabExpense" class="tab" onclick="showExpense()">Chi</div>
            </div>

            <div id="transactionList"></div>

        </div>

    </div>

    <script>

        const API = "http://localhost:3000/api/v1/stats/monthly"
        const TOKEN = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiI2OWI3OTg4ZjBlZDQ5YzZkZTI1OTkxNTMiLCJpYXQiOjE3NzM2NjQwNjEsImV4cCI6MTc3NjI1NjA2MX0.07YRs14WmPYESIEg9BteFqt0jBmhR7AY9bEZNsZHZSg"

        let statsData = []
        let currentMonthIndex = 0
        let currentTab = "income"

        async function loadStats() {

            const res = await fetch(API, {
                headers: {
                    Authorization: `Bearer ${TOKEN}`
                }
            })

            statsData = await res.json()

            if (statsData.length > 0) {
                currentMonthIndex = statsData.length - 1
                render()
            }

        }

        function render() {

            const month = statsData[currentMonthIndex]

            document.getElementById("monthTitle").innerText = "Tháng " + month.month

            document.getElementById("incomeTotal").innerText =
                month.totalIncome.toLocaleString() + " đ"

            document.getElementById("expenseTotal").innerText =
                month.totalExpense.toLocaleString() + " đ"

            document.getElementById("balanceTotal").innerText =
                month.balance.toLocaleString() + " đ"

            renderTransactions()

        }

        function renderTransactions() {

            const month = statsData[currentMonthIndex]
            let html = ""

            let list = currentTab === "income"
                ? month.incomeTransactions
                : month.expenseTransactions

            list?.forEach(t => {
                html += `
<div class="transaction">
<span>${t.name}</span>
<span class="${currentTab}">
${currentTab === "income" ? "+" : "-"}
${t.amount.toLocaleString()} đ
</span>
</div>`
            })

            document.getElementById("transactionList").innerHTML =
                html || "Không có giao dịch"

        }

        function showIncome() {
            currentTab = "income"
            document.getElementById("tabIncome").classList.add("active")
            document.getElementById("tabExpense").classList.remove("active")
            renderTransactions()
        }

        function showExpense() {
            currentTab = "expense"
            document.getElementById("tabExpense").classList.add("active")
            document.getElementById("tabIncome").classList.remove("active")
            renderTransactions()
        }

        function prevMonth() {
            if (currentMonthIndex > 0) {
                currentMonthIndex--
                render()
            }
        }

        function nextMonth() {
            if (currentMonthIndex < statsData.length - 1) {
                currentMonthIndex++
                render()
            }
        }

        loadStats()

    </script>

</body>

</html>
