<link rel="stylesheet" href="css/style.css">

<div id="navbar"></div>

<div class="container">

    <h1>💰 Tạo giao dịch</h1>

    <div class="card">

        <div class="tabs">
            <div id="tabIncome" class="tab active" onclick="showIncome()">Thu</div>
            <div id="tabExpense" class="tab" onclick="showExpense()">Chi</div>
        </div>

        <h3>Danh mục</h3>

        <div id="categoryCards" class="category-grid"></div>

        <form id="transactionForm">

            <input id="amount" type="number" placeholder="Số tiền">

            <input id="note" placeholder="Ghi chú">

            <input id="date" type="date">

            <button id="submitBtn">+ Thêm thu</button>

        </form>

    </div>

</div>

<script src="js/navbar.js"></script>
<script src="js/api.js"></script>
<script src="js/transactions.js"></script>
